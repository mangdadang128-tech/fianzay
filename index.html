<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lobby Kelas</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>Lobby Kelas</h1>
      <p class="sub">Upload foto kelas, lalu tampilkan kartu kelas di lobby.</p>
    </div>
    <button id="btnClearAll" class="btn btn--danger" type="button" title="Hapus semua kelas">
      Hapus Semua
    </button>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Tambah Kelas</h2>

      <form id="formAddClass" class="form" autocomplete="off">
        <label class="field">
          <span>Nama kelas</span>
          <input id="inputClassName" type="text" placeholder="Contoh: XII TKJ 3" maxlength="60" required />
        </label>

        <label class="field">
          <span>Deskripsi (opsional)</span>
          <input id="inputClassDesc" type="text" placeholder="Contoh: Kelas praktik jaringan" maxlength="80" />
        </label>

        <label class="field">
          <span>Foto kelas</span>
          <input id="inputClassPhoto" type="file" accept="image/*" required />
          <small class="hint">Foto akan disimpan di browser (LocalStorage) sebagai data gambar.</small>
        </label>

        <div class="previewWrap">
          <div class="previewLabel">Preview</div>
          <img id="imgPreview" class="preview" alt="Preview foto" />
        </div>

        <div class="actions">
          <button class="btn" type="submit">Tambah Kelas</button>
          <button id="btnResetForm" class="btn btn--ghost" type="button">Batal</button>
        </div>

        <p id="formMsg" class="formMsg" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel">
      <div class="panelHeader">
        <h2>Daftar Kelas</h2>
        <div class="count" id="classCount">500 KELAS</div>
      </div>

      <div id="grid" class="grid" aria-live="polite"></div>

      <div id="emptyState" class="emptyState" hidden>
        Belum ada kelas. Tambahkan kelas lewat form di atas.
      </div>
    </section>
  </main>

  <script src="./main.js" defer></script>
</body>
</html>
